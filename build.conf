# modulus build configuration
# These are the default flag values for debug builds.
# Release mode (make release) forces all to false regardless of this file.
# Override per-build by setting env vars before calling make: MODULUS_DEBUG=false make build
#
# NOTE: This file is temporary scaffolding until the module manifest metaprogram
# takes over flag management. See: modulus/roadmap/Build Config and Metaprogram.md

MODULUS_DEBUG=true
MODULUS_HOT_RELOAD=true

# Default app module to run (make run / make run-release).
# Override: make run MODULE=my_app
MODULE=test_module
